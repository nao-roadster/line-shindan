<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>180問 精密タイプ診断</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --line-green: #06C755; --bg-gray: #f5f6f7; }
        body { font-family: "Helvetica Neue", Arial, sans-serif; background-color: var(--bg-gray); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .progress-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; color: #888; }
        .bar-outer { height: 6px; background: #eee; border-radius: 3px; margin-bottom: 25px; overflow: hidden; }
        .bar-inner { height: 100%; background: var(--line-green); width: 0%; transition: width 0.3s; }
        .q-container { border-bottom: 1px solid #f0f0f0; padding: 20px 0; }
        .q-text { font-size: 1rem; font-weight: bold; margin-bottom: 15px; line-height: 1.4; color: #333; }
        .choice-group { display: flex; gap: 10px; }
        .choice-btn { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: white; cursor: pointer; font-weight: bold; color: #666; transition: 0.2s; }
        .choice-btn.active { background: var(--line-green); color: white; border-color: var(--line-green); }
        .next-btn { width: 100%; padding: 18px; background: var(--line-green); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 30px; transition: opacity 0.2s; }
        .next-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        #result-screen { display: none; text-align: center; }
        .result-type { font-size: 2rem; color: var(--line-green); margin: 20px 0; font-weight: 900; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-screen">
        <div class="progress-header">
            <span>進捗 <span id="percent">0%</span></span>
            <span><span id="current-page">1</span> / 45 ページ</span>
        </div>
        <div class="bar-outer"><div class="bar-inner" id="bar-inner"></div></div>
        <div id="question-list"></div>
        <button id="next-button" class="next-btn" onclick="nextPage()" disabled>次の4問へ</button>
    </div>

    <div id="result-screen">
        <p>診断結果を送信中...</p>
        <div id="result-content" style="display:none;">
            <p>あなたの診断結果は...</p>
            <div id="best-type-name" class="result-type"></div>
            <p id="type-description" style="color:#666; line-height:1.6; white-space: pre-wrap;"></p>
            <button class="next-btn" onclick="location.reload()">もう一度診断する</button>
        </div>
    </div>
</div>

<script>
    // --- 設定 ---
    const LIFF_ID = "2009366481-tsJl1FE2";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbygLalmi1iw0z0TuZvBpTpu5ciWFiwgUG4qVdemOu8mebnIhVAvlPJjW8ccyYz7nPs/exec";

    const rawDataList = [
        "自分の欠点を改め、より良い人間になろうと努力している,type1",
        "物事があるべき姿でないとイライラする,type1",
        "自分に割り当てられた以上に働くことがよくある,type1",
        "もっとよくやれたはずなのにと自分を責める,type1",
        "小さなミスや欠点が気にかかり、細部にこだわる,type1",
        "他人から批判されないように、物事は正しく行おうとする,type1",
        "批判的にはなりたくないが、そうならずにいるのは難しい,type1",
        "すべてのことに率直でありたいと思っている,type1",
        "不正なことや悪いことをする人は許せない,type1",
        "嘘やごまかしなど悪いことはしない主義だ,type1"
        // ... 残りの質問
    ];

    const typeDetails = {
        type1: { name: "完璧主義者", desc: "高い理想を持ち、正義感にあふれるタイプです。" },
        type2: { name: "献身家", desc: "思いやりがあり、人の助けになることに喜びを感じるタイプです。" },
        type3: { name: "達成者", desc: "目標に向かって効率よく成果を出すのが得意なタイプです。" },
        type4: { name: "芸術家", desc: "独自の感性を持ち、自分の世界観を大切にするタイプです。" },
        type5: { name: "研究者", desc: "知識を蓄え、物事を冷静に観察・分析するタイプです。" },
        type6: { name: "慎重派", desc: "責任感が強く、安全や信頼を第一に考えるタイプです。" },
        type7: { name: "楽天家", desc: "好奇心旺盛で、人生を楽しくポジティブに過ごすタイプです。" },
        type8: { name: "統率者", desc: "決断力があり、周囲を力強く引っ張っていくリーダータイプです。" },
        type9: { name: "平和主義者", desc: "穏やかで、周囲との調和を大切にするタイプです。" }
    };

    let questions = [];
    let currentPage = 0;
    const questionsPerPage = 4;
    let userAnswers = {}; // { 質問INDEX: スコア }

    function init() {
        questions = rawDataList.map(item => {
            const lastCommaIndex = item.lastIndexOf(",");
            return { text: item.substring(0, lastCommaIndex), type: item.substring(lastCommaIndex + 1).trim() };
        });
        renderPage();
    }

    function renderPage() {
        const listContainer = document.getElementById("question-list");
        listContainer.innerHTML = "";
        
        const start = currentPage * questionsPerPage;
        const end = Math.min(start + questionsPerPage, questions.length);

        for (let i = start; i < end; i++) {
            const qDiv = document.createElement("div");
            qDiv.className = "q-container";
            qDiv.innerHTML = `
                <div class="q-text">${i + 1}. ${questions[i].text}</div>
                <div class="choice-group">
                    <button class="choice-btn ${userAnswers[i] === 1 ? 'active' : ''}" onclick="selectAnswer(${i}, 1, this)">はい</button>
                    <button class="choice-btn ${userAnswers[i] === 0 ? 'active' : ''}" onclick="selectAnswer(${i}, 0, this)">いいえ</button>
                </div>
            `;
            listContainer.appendChild(qDiv);
        }

        updateUI();
    }

    function selectAnswer(index, score, btn) {
        userAnswers[index] = score;
        
        // ボタンの見た目を更新
        const parent = btn.parentElement;
        Array.from(parent.children).forEach(child => child.classList.remove('active'));
        btn.classList.add('active');

        checkPageCompletion();
    }

    function checkPageCompletion() {
        const start = currentPage * questionsPerPage;
        const end = Math.min(start + questionsPerPage, questions.length);
        let completed = true;
        for (let i = start; i < end; i++) {
            if (userAnswers[i] === undefined) completed = false;
        }
        document.getElementById("next-button").disabled = !completed;
    }

    function nextPage() {
        if (currentPage < Math.ceil(questions.length / questionsPerPage) - 1) {
            currentPage++;
            renderPage();
            window.scrollTo(0, 0); // ページトップへ戻る
        } else {
            showResult();
        }
    }

    function updateUI() {
        const totalPages = Math.ceil(questions.length / questionsPerPage);
        document.getElementById("current-page").innerText = currentPage + 1;
        const progress = (currentPage / totalPages) * 100;
        document.getElementById("bar-inner").style.width = progress + "%";
        document.getElementById("percent").innerText = Math.floor(progress) + "%";
        document.getElementById("next-button").innerText = (currentPage === totalPages - 1) ? "結果を見る" : "次の4問へ";
        checkPageCompletion();
    }

    function showResult() {
        document.getElementById("quiz-screen").style.display = "none";
        document.getElementById("result-screen").style.display = "block";
        
        let scores = { type1:0, type2:0, type3:0, type4:0, type5:0, type6:0, type7:0, type8:0, type9:0 };
        Object.keys(userAnswers).forEach(idx => {
            if (userAnswers[idx] === 1) {
                scores[questions[idx].type]++;
            }
        });

        let bestType = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        document.getElementById("best-type-name").innerText = typeDetails[bestType].name;
        document.getElementById("type-description").innerText = typeDetails[bestType].desc;

async function showResult() {
    // ...既存の判定処理...
    let bestType = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
    const resultName = typeDetails[bestType].name;

    // スプレッドシートに送信
    const gasUrl = "https://script.google.com/macros/s/AKfycbygLalmi1iw0z0TuZvBpTpu5ciWFiwgUG4qVdemOu8mebnIhVAvlPJjW8ccyYz7nPs/exec";
    
    fetch(gasUrl, {
        method: "POST",
        body: JSON.stringify({
            userName: window.userName || "Guest",
            resultType: resultName,
            answers: userAnswers // すべての回答データ
        })
    });

    // 画面切り替え処理...
}


    }

// LIFFの初期化（ユーザー名取得用）
async function initializeLiff() {
    await liff.init({ liffId: "2009366481-tsJl1FE2" });
    if (liff.isLoggedIn()) {
        const profile = await liff.getProfile();
        window.userName = profile.displayName; // ユーザー名を保持
    } else {
        window.userName = "未ログインユーザー";
    }
}


    init();
</script>
</body>
</html>
