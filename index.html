<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>性格診断アプリ</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { text-align: center; font-size: 1.2em; }
        .progress-bar { width: 100%; background-color: #e0e0e0; border-radius: 5px; margin-bottom: 20px; }
        .progress-fill { height: 10px; background-color: #00b900; width: 0%; border-radius: 5px; transition: width 0.3s; }
        .question { display: none; }
        .question.active { display: block; }
        .options { margin-top: 15px; }
        button { display: block; width: 100%; padding: 10px; margin-bottom: 10px; background-color: white; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; text-align: left; }
        button:hover { background-color: #f0f0f0; }
        #result { display: none; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>性格診断ツール</h1>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    
    <div id="quizArea">
        <div id="questionText"></div>
        <div id="optionsArea" class="options"></div>
    </div>

    <div id="result">
        <h2>診断結果</h2>
        <p id="resultText"></p>
        <button onclick="location.reload()">もう一度診断する</button>
    </div>
</div>

<script>
    // 💡 1. 診断データ（お手持ちのリストをここに当てはめてください）



const questions = [
    // --- カテゴリ1：完璧・理想 (Type 1) ---
    { text: "自分の欠点を改め、より良い人間になろうと努力している", options: [{ label: "はい", scores: { type1: 2 } }, { label: "いいえ", scores: { type1: 0 } }] },
    { text: "物事があるべき姿でないとイライラする", options: [{ label: "はい", scores: { type1: 2 } }, { label: "いいえ", scores: { type1: 0 } }] },
    { text: "もっとよくやれたはずなのにどうしてやれなかったのかと、しばしば自分を責める", options: [{ label: "はい", scores: { type1: 2 } }, { label: "いいえ", scores: { type1: 0 } }] },
    { text: "小さなミスや欠点が気にかかり、細部にこだわる", options: [{ label: "はい", scores: { type1: 2 } }, { label: "いいえ", scores: { type1: 0 } }] },
    // --- カテゴリ2：献身・助け合い (Type 2) ---
    { text: "他人が困っていると、自分のことを後回しにして助ける", options: [{ label: "はい", scores: { type2: 2 } }, { label: "いいえ", scores: { type2: 0 } }] },
    { text: "人から感謝されることが、何よりのモチベーションだ", options: [{ label: "はい", scores: { type2: 2 } }, { label: "いいえ", scores: { type2: 0 } }] },
    { text: "相手が何を求めているか、察するのが得意だ", options: [{ label: "はい", scores: { type2: 2 } }, { label: "いいえ", scores: { type2: 0 } }] },
    // --- カテゴリ3：達成・効率 (Type 3) ---
    { text: "目標を達成するためなら、多少の無理もいとわない", options: [{ label: "はい", scores: { type3: 2 } }, { label: "いいえ", scores: { type3: 0 } }] },
    { text: "周囲から「有能だ」と思われたいという欲求が強い", options: [{ label: "はい", scores: { type3: 2 } }, { label: "いいえ", scores: { type3: 0 } }] },
    { text: "効率の悪いやり方を見ているとイライラする", options: [{ label: "はい", scores: { type3: 2 } }, { label: "いいえ", scores: { type3: 0 } }] },
    // --- カテゴリ4：個性・感受性 (Type 4) ---
    { text: "他人と同じであることを嫌い、独自性を大切にする", options: [{ label: "はい", scores: { type4: 2 } }, { label: "いいえ", scores: { type4: 0 } }] },
    { text: "自分の感情に深く沈み込み、物思いにふけることが多い", options: [{ label: "はい", scores: { type4: 2 } }, { label: "いいえ", scores: { type4: 0 } }] },
    { text: "芸術や美しいものに対して人一倍感動しやすい", options: [{ label: "はい", scores: { type4: 2 } }, { label: "いいえ", scores: { type4: 0 } }] },
    // --- カテゴリ5：観察・知識 (Type 5) ---
    { text: "行動する前に、まず情報を集めて分析したい", options: [{ label: "はい", scores: { type5: 2 } }, { label: "いいえ", scores: { type5: 0 } }] },
    { text: "一人で静かに考える時間が、自分には絶対必要だ", options: [{ label: "はい", scores: { type5: 2 } }, { label: "いいえ", scores: { type5: 0 } }] },
    { text: "感情的な議論よりも、論理的な話し合いを好む", options: [{ label: "はい", scores: { type5: 2 } }, { label: "いいえ", scores: { type5: 0 } }] },
    // --- カテゴリ6：忠実・安全 (Type 6) ---
    { text: "リスクを最小限に抑えるための準備を欠かさない", options: [{ label: "はい", scores: { type6: 2 } }, { label: "いいえ", scores: { type6: 0 } }] },
    { text: "信頼できるリーダーやルールがあると安心する", options: [{ label: "はい", scores: { type6: 2 } }, { label: "いいえ", scores: { type6: 0 } }] },
    { text: "「もし〜なったらどうしよう」と不安になることが多い", options: [{ label: "はい", scores: { type6: 2 } }, { label: "いいえ", scores: { type6: 0 } }] },
    // --- カテゴリ7：熱中・楽天 (Type 7) ---
    { text: "楽しい計画を立てている時が一番幸せだ", options: [{ label: "はい", scores: { type7: 2 } }, { label: "いいえ", scores: { type7: 0 } }] },
    { text: "一つのことに集中するより、色々なことに興味を持ちたい", options: [{ label: "はい", scores: { type7: 2 } }, { label: "いいえ", scores: { type7: 0 } }] },
    { text: "辛いことがあっても、すぐに切り替えて前を向ける", options: [{ label: "はい", scores: { type7: 2 } }, { label: "いいえ", scores: { type7: 0 } }] },
    // --- カテゴリ8：挑戦・強さ (Type 8) ---
    { text: "自分の意見ははっきりと主張する方だ", options: [{ label: "はい", scores: { type8: 2 } }, { label: "いいえ", scores: { type8: 0 } }] },
    { text: "不公平なことや弱いものいじめを見ると黙っていられない", options: [{ label: "はい", scores: { type8: 2 } }, { label: "いいえ", scores: { type8: 0 } }] },
    { text: "他人にコントロールされるのを極端に嫌う", options: [{ label: "はい", scores: { type8: 2 } }, { label: "いいえ", scores: { type8: 0 } }] },
    // --- カテゴリ9：平和・調和 (Type 9) ---
    { text: "争いごとは避け、穏やかに過ごしたい", options: [{ label: "はい", scores: { type9: 2 } }, { label: "いいえ", scores: { type9: 0 } }] },
    { text: "周囲の雰囲気に自分を合わせるのが得意だ", options: [{ label: "はい", scores: { type9: 2 } }, { label: "いいえ", scores: { type9: 0 } }] },
    { text: "決断を迫られると、つい先延ばしにしてしまう", options: [{ label: "はい", scores: { type9: 2 } }, { label: "いいえ", scores: { type9: 0 } }] },

    // ※ スペースの都合上、同様の形式で各タイプ11問〜12問ずつ配置して合計100問にします。
    // 以下、同様のロジックで合計100になるまで質問を追加した完全版を作成可能です。
];




    // 💡 2. タイプ名定義（9種類）
    const typeNames = {
        type1: "冒険家タイプ",
        type2: "計画家タイプ",
        type3: "芸術家タイプ",
        type4: "分析家タイプ",
        // ... あと5つ追加
    };

    let currentQuestionIndex = 0;
    let scores = {}; // スコア初期化用

    // スコアを初期化する関数
    function initScores() {
        Object.keys(typeNames).forEach(type => scores[type] = 0);
    }

    function showQuestion() {
        if (currentQuestionIndex >= questions.length) {
            showResult();
            return;
        }

        const q = questions[currentQuestionIndex];
        document.getElementById("questionText").innerText = `Q${currentQuestionIndex + 1}: ${q.text}`;
        
        // 進捗バーの更新
        const progress = (currentQuestionIndex / questions.length) * 100;
        document.getElementById("progressFill").style.width = `${progress}%`;

        const optionsArea = document.getElementById("optionsArea");
        optionsArea.innerHTML = "";
        
        q.options.forEach(option => {
            const btn = document.createElement("button");
            btn.innerText = option.label;
            btn.onclick = () => {
                // スコア加算
                for (let type in option.scores) {
                    scores[type] += option.scores[type];
                }
                currentQuestionIndex++;
                showQuestion();
            };
            optionsArea.appendChild(btn);
        });
    }

    function showResult() {
        document.getElementById("quizArea").style.display = "none";
        document.getElementById("progressFill").style.width = "100%";
        document.getElementById("result").style.display = "block";

        // 最高得点のタイプを計算
        let bestType = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        document.getElementById("resultText").innerText = `あなたのタイプは「${typeNames[bestType]}」です！`;
    }

    // アプリ開始
    initScores();
    showQuestion();
</script>

</body>
</html>
